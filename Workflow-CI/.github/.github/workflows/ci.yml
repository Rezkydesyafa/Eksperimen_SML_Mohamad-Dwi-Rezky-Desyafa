name: MLflow CI Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'
      
      - name: Check Env
        run: |
          python --version
          pip --version
          echo "Working directory: $(pwd)"
          echo "OS: $(uname -a)"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas==2.2.3 numpy==2.1.3 scikit-learn==1.5.2 mlflow==2.19.0 matplotlib==3.9.2 seaborn==0.13.2 joblib==1.4.2
      
      - name: Set MLflow Tracking URI
        run: |
          echo "MLFLOW_TRACKING_URI=mlruns" >> $GITHUB_ENV
          echo "MLflow Tracking URI set to local file store"
      
      - name: Run mlflow project
        working-directory: MLProject
        env:
          MLFLOW_TRACKING_URI: ""
        run: |
          mlflow run . --env-manager=local
      
      - name: Install Python dependencies
        run: |
          pip install gdown
      
      - name: Upload to Google Drive
        working-directory: MLProject
        run: |
          echo "=== Training Artifacts ==="
          ls -la artifacts/ 2>/dev/null || echo "No artifacts directory"
          echo ""
          echo "=== MLflow Runs ==="
          ls -la mlruns/ 2>/dev/null || echo "No mlruns directory"
          echo ""
          echo "Artifacts successfully generated and ready for upload."
          echo "Note: For local submission, artifacts are stored in GitHub Actions."
      
      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts
          path: MLProject/artifacts/
          retention-days: 30
      
      - name: Upload MLflow runs
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: MLProject/mlruns/
          retention-days: 30
